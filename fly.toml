# Deploy: fly launch && fly deploy
# เปิด 24 ชม.: auto_stop_machines = false + min_machines_running = 1

app = "jenga-game"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1